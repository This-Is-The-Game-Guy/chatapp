<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #dcddde;
            padding: 30px;
        }
        h1 { color: white; margin-bottom: 8px; }
        .subtitle { color: #72767d; margin-bottom: 30px; font-size: 14px; }
        .section {
            background: #2f3136;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section h2 { color: white; margin-bottom: 16px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 10px 12px;
            color: #72767d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #40444b;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #40444b;
            font-size: 14px;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge.banned { background: #f04747; color: white; }
        .badge.active { background: #43b581; color: white; }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            margin-right: 6px;
        }
        .btn-ban { background: #f04747; color: white; }
        .btn-ban:hover { background: #c73652; }
        .btn-unban { background: #43b581; color: white; }
        .btn-unban:hover { background: #3aa06e; }
        .btn-kick { background: #faa61a; color: white; }
        .btn-kick:hover { background: #e09500; }
        .btn-delete { background: #f04747; color: white; }
        .btn-delete:hover { background: #c73652; }
        .msg-content {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #43b581;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat {
            background: #2f3136;
            border-radius: 10px;
            padding: 16px 24px;
            flex: 1;
            text-align: center;
        }
        .stat .number { font-size: 32px; font-weight: bold; color: #7289da; }
        .stat .label { font-size: 13px; color: #72767d; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>🛡️ Admin Panel</h1>
    <p class="subtitle">Welcome back, Indian_IV. Here's what's happening.</p>

    <div class="stats">
        <div class="stat">
            <div class="number" id="totalUsers">-</div>
            <div class="label">Total Users</div>
        </div>
        <div class="stat">
            <div class="number" id="bannedUsers">-</div>
            <div class="label">Banned</div>
        </div>
        <div class="stat">
            <div class="number" id="totalMessages">-</div>
            <div class="label">Messages</div>
        </div>
    </div>

    <div class="section">
        <h2>👥 Users</h2>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Status</th>
                    <th>Account</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>💬 Recent Messages</h2>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Message</th>
                    <th>Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="messagesTable"></tbody>
        </table>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const key = params.get('key');

        function showToast(msg, color = '#43b581') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        async function loadUsers() {
            const res = await fetch(`/admin/users?key=${key}`);
            const users = await res.json();
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('bannedUsers').textContent = users.filter(u => u.banned).length;
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(u => `
                <tr id="user-${u.username}">
                    <td><strong>${u.username}</strong></td>
                    <td>${u.status || 'online'}</td>
                    <td><span class="badge ${u.banned ? 'banned' : 'active'}">${u.banned ? 'Banned' : 'Active'}</span></td>
                    <td>
                        ${u.username !== 'Indian_IV' ? `
                            <button class="btn btn-kick" onclick="kickUser('${u.username}')">🚪 Kick</button>
                            ${u.banned
                                ? `<button class="btn btn-unban" onclick="unbanUser('${u.username}')">✅ Unban</button>`
                                : `<button class="btn btn-ban" onclick="banUser('${u.username}')">🔨 Ban</button>`
                            }
                        ` : '<span style="color:#72767d">You</span>'}
                    </td>
                </tr>
            `).join('');
        }

        async function loadMessages() {
            const res = await fetch(`/admin/messages?key=${key}`);
            const msgs = await res.json();
            document.getElementById('totalMessages').textContent = msgs.length;
            const tbody = document.getElementById('messagesTable');
            tbody.innerHTML = msgs.reverse().map(m => `
                <tr id="msg-${m.id}">
                    <td><strong>${m.username}</strong></td>
                    <td class="msg-content" title="${m.content}">${m.content}</td>
                    <td style="color:#72767d;font-size:12px">${new Date(m.timestamp).toLocaleString()}</td>
                    <td><button class="btn btn-delete" onclick="deleteMessage(${m.id})">🗑️ Delete</button></td>
                </tr>
            `).join('');
        }

        async function kickUser(username) {
            if (!confirm(`Kick ${username}?`)) return;
            await fetch('/admin/kick', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, username })
            });
            showToast(`${username} has been kicked!`, '#faa61a');
        }

        async function banUser(username) {
            if (!confirm(`Ban ${username}? They won't be able to log in.`)) return;
            await fetch('/admin/ban', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, username })
            });
            showToast(`${username} has been banned!`, '#f04747');
            loadUsers();
        }

        async function unbanUser(username) {
            await fetch('/admin/unban', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, username })
            });
            showToast(`${username} has been unbanned!`, '#43b581');
            loadUsers();
        }

        async function deleteMessage(id) {
            if (!confirm('Delete this message?')) return;
            await fetch('/admin/delete_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, id })
            });
            document.getElementById(`msg-${id}`).remove();
            showToast('Message deleted!', '#f04747');
        }

        loadUsers();
loadMessages();

// Auto refresh every 5 seconds
setInterval(() => {
    loadUsers();
    loadMessages();
}, 1000);
    </script>
</body>
</html>
