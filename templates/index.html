<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 500px;
            height: 650px;
            background: #2f3136;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header {
            background: #202225;
            padding: 16px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header span { color: #72767d; font-size: 14px; font-weight: normal; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .username {
            font-size: 13px;
            font-weight: bold;
            color: #7289da;
        }
        .content {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.5;
        }
        .system {
            color: #72767d;
            font-size: 13px;
            font-style: italic;
            text-align: center;
        }
        .input-area {
            padding: 16px;
            background: #2f3136;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]::placeholder { color: #72767d; }
        button {
            background: #7289da;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        button:hover { background: #5b6eae; }
        .join-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .join-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 340px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .join-box h2 { color: white; text-align: center; }
        .join-box p { color: #72767d; text-align: center; font-size: 14px; }
        .join-box input {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .join-box button {
            width: 100%;
            padding: 14px;
        }
    </style>
</head>
<body>

    <div class="join-screen" id="joinScreen">
        <div class="join-box">
            <h2>💬 Welcome</h2>
            <p>Enter a username to join the chat</p>
            <input type="text" id="usernameInput" placeholder="Your username..." />
            <button onclick="joinChat()">Join Chat</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            💬 general <span>A real time chat room</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Message #general" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let username = "";

        function joinChat() {
            const input = document.getElementById("usernameInput");
            username = input.value.trim();
            if (!username) return;

            document.getElementById("joinScreen").style.display = "none";

            socket.emit("message", {
                username: "System",
                content: username + " joined the chat! 👋",
                system: true
            });
        }

        document.getElementById("usernameInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") joinChat();
        });

        document.getElementById("messageInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content || !username) return;

            socket.emit("message", { username, content, system: false });
            input.value = "";
        }

        socket.on("message", function(data) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.classList.add("message");

            if (data.system) {
                div.innerHTML = `<span class="system">${data.content}</span>`;
            } else {
                div.innerHTML = `
                    <span class="username">${data.username}</span>
                    <span class="content">${data.content}</span>
                `;
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
