<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat (Beta)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 500px;
            height: 650px;
            background: #2f3136;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header {
            background: #202225;
            padding: 16px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header span { color: #72767d; font-size: 14px; font-weight: normal; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .header-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7289da;
            cursor: pointer;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #72767d;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .icon-btn:hover { background: #40444b; color: white; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; gap: 12px; align-items: flex-start; }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .avatar:hover { opacity: 0.8; }
        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 0; right: 0;
            border: 2px solid #2f3136;
        }
        .message-body { display: flex; flex-direction: column; gap: 2px; }
        .message-header { display: flex; align-items: center; gap: 8px; }
        .username { font-size: 14px; font-weight: bold; color: #7289da; cursor: pointer; }
        .username:hover { text-decoration: underline; }
        .timestamp { font-size: 11px; color: #72767d; }
        .content { color: #dcddde; font-size: 14px; line-height: 1.5; }
        .bio-tag { font-size: 11px; color: #72767d; font-style: italic; }
        .system { color: #72767d; font-size: 13px; font-style: italic; text-align: center; width: 100%; }
        .input-area {
            padding: 16px;
            background: #2f3136;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"], input[type="password"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        input::placeholder { color: #72767d; }
        button {
            background: #7289da;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        button:hover { background: #5b6eae; }
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .auth-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-box h2 { color: white; text-align: center; font-size: 22px; }
        .auth-box label { color: #72767d; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .auth-box input[type="text"],
        .auth-box input[type="password"],
        .auth-box textarea {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
        }
        .auth-box textarea { resize: none; height: 70px; }
        .auth-box button { width: 100%; padding: 14px; }
        .error-msg { color: #f04747; font-size: 13px; text-align: center; display: none; }
        .avatar-upload { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .avatar-preview {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #7289da;
            background: #40444b;
        }
        .upload-btn {
            background: #40444b !important;
            color: #dcddde !important;
            font-size: 13px !important;
            padding: 8px 16px !important;
            width: auto !important;
        }
        .status-options { display: flex; gap: 10px; }
        .status-option {
            flex: 1; padding: 10px;
            border-radius: 8px;
            background: #40444b;
            color: #dcddde;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .status-option.selected { border-color: #7289da; background: #3d4a6b; }
        .tabs { display: flex; gap: 10px; }
        .tab {
            flex: 1; padding: 10px;
            border-radius: 8px;
            background: #40444b;
            color: #72767d;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: bold;
        }
        .tab.active { border-color: #7289da; color: white; background: #3d4a6b; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #2f3136;
            border-radius: 12px;
            padding: 30px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }
        .modal h3 { color: white; font-size: 18px; text-align: center; }
        .modal label { color: #72767d; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .modal input[type="text"],
        .modal textarea {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
        }
        .modal textarea { resize: none; height: 70px; }
        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            color: #72767d;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .modal-close:hover { color: white; background: none; }
        .profile-popup {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .profile-popup img {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #7289da;
        }
        .profile-popup .popup-username { color: white; font-size: 20px; font-weight: bold; }
        .profile-popup .popup-status { font-size: 13px; font-weight: bold; }
        .profile-popup .popup-bio {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.5;
            background: #40444b;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
            text-align: left;
        }
        .save-btn { width: 100%; padding: 12px; margin-top: 4px; }
        .ai-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            height: 500px;
            background: #2f3136;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 30;
            border: 1px solid #40444b;
        }
        .ai-window.open { display: flex; }
        .ai-header {
            background: #202225;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: bold;
            font-size: 15px;
        }
        .ai-header-right { margin-left: auto; display: flex; gap: 8px; }
        .ai-personality-btn {
            background: #40444b;
            border: none;
            color: #dcddde;
            font-size: 13px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .ai-personality-btn:hover { background: #4f5660; }
        .ai-close {
            background: none;
            border: none;
            color: #72767d;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        .ai-close:hover { color: white; background: #40444b; }
        .ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ai-msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
        }
        .ai-msg.user {
            background: #7289da;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-msg.assistant {
            background: #40444b;
            color: #dcddde;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .ai-msg.typing {
            background: #40444b;
            color: #72767d;
            align-self: flex-start;
            font-style: italic;
        }
        .ai-input-area {
            padding: 12px;
            background: #202225;
            display: flex;
            gap: 8px;
        }
        .ai-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .ai-input-area button { padding: 10px 14px; font-size: 14px; }
        .personality-modal {
            background: #2f3136;
            border-radius: 12px;
            padding: 24px;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }
        .personality-modal h3 { color: white; font-size: 17px; }
        .personality-modal p { color: #72767d; font-size: 13px; }
        .personality-modal textarea {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
            width: 100%;
            height: 120px;
            resize: none;
            font-family: 'Segoe UI', sans-serif;
        }
        .preset-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .preset-btn {
            background: #40444b;
            color: #dcddde;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            width: auto;
        }
        .preset-btn:hover { background: #4f5660; }
        .ai-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #7289da;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 29;
            display: none;
        }
        .ai-toggle:hover { background: #5b6eae; }
        .ai-toggle.visible { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div class="screen" id="authScreen">
        <div class="auth-box">
            <h2>💬 BEST CHAT</h2>
            <div class="tabs">
                <div class="tab active" id="loginTab" onclick="switchTab('login')">Log In</div>
                <div class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</div>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <div id="loginForm">
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div><label>Username</label><input type="text" id="loginUsername" placeholder="Your username..." /></div>
                    <div><label>Password</label><input type="password" id="loginPassword" placeholder="Your password..." /></div>
                    <button onclick="doLogin()">Log In 🚀</button>
                </div>
            </div>
            <div id="signupForm" style="display:none">
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div class="avatar-upload">
                        <img id="avatarPreview" class="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" />
                        <input type="file" id="avatarInput" accept="image/*" style="display:none" />
                        <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">📷 Upload Photo</button>
                    </div>
                    <div><label>Username</label><input type="text" id="signupUsername" placeholder="Pick a username..." /></div>
                    <div><label>Password</label><input type="password" id="signupPassword" placeholder="Create a password..." /></div>
                    <div><label>Bio</label><textarea id="signupBio" placeholder="Tell us about yourself..."></textarea></div>
                    <div>
                        <label>Status</label>
                        <div class="status-options">
                            <div class="status-option selected" data-status="online" onclick="selectStatus(this, 'signup')">🟢 Online</div>
                            <div class="status-option" data-status="busy" onclick="selectStatus(this, 'signup')">🔴 Busy</div>
                            <div class="status-option" data-status="away" onclick="selectStatus(this, 'signup')">🟡 Away</div>
                        </div>
                    </div>
                    <button onclick="doSignup()">Create Account 🎉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay" onclick="closeSettings(event)">
        <div class="modal">
            <button class="modal-close" onclick="document.getElementById('settingsOverlay').classList.remove('open')">✕</button>
            <h3>⚙️ Edit Profile</h3>
            <div class="avatar-upload">
                <img id="settingsAvatarPreview" class="avatar-preview" src="" />
                <input type="file" id="settingsAvatarInput" accept="image/*" style="display:none" />
                <button class="upload-btn" onclick="document.getElementById('settingsAvatarInput').click()">📷 Change Photo</button>
            </div>
            <div><label>Bio</label><textarea id="settingsBio" placeholder="Tell us about yourself..."></textarea></div>
            <div>
                <label>Status</label>
                <div class="status-options">
                    <div class="status-option" data-status="online" onclick="selectStatus(this, 'settings')">🟢 Online</div>
                    <div class="status-option" data-status="busy" onclick="selectStatus(this, 'settings')">🔴 Busy</div>
                    <div class="status-option" data-status="away" onclick="selectStatus(this, 'settings')">🟡 Away</div>
                </div>
            </div>
            <button class="save-btn" onclick="saveSettings()">Save Changes ✅</button>
        </div>
    </div>

    <!-- Profile Popup Modal -->
    <div class="modal-overlay" id="profileOverlay" onclick="closeProfile(event)">
        <div class="modal">
            <button class="modal-close" onclick="document.getElementById('profileOverlay').classList.remove('open')">✕</button>
            <div class="profile-popup">
                <img id="popupAvatar" src="" />
                <div class="popup-username" id="popupUsername"></div>
                <div class="popup-status" id="popupStatus"></div>
                <div class="popup-bio" id="popupBio"></div>
            </div>
        </div>
    </div>

    <!-- Personality Modal -->
    <div class="modal-overlay" id="personalityOverlay" onclick="closePersonality(event)">
        <div class="personality-modal">
            <button class="modal-close" onclick="document.getElementById('personalityOverlay').classList.remove('open')">✕</button>
            <h3>🎭 AI Personality</h3>
            <p>Customize how the AI talks to you. Leave blank for default helpful assistant.</p>
            <textarea id="personalityInput" placeholder="e.g. You are Lily, an adoring fan who is half cat..."></textarea>
            <div class="preset-btns">
                <button class="preset-btn" onclick="setPreset('default')">🤖 Default</button>
                <button class="preset-btn" onclick="setPreset('pirate')">🏴‍☠️ Pirate</button>
                <button class="preset-btn" onclick="setPreset('roast')">🔥 Roast Bot</button>
                <button class="preset-btn" onclick="setPreset('shakespeare')">📜 Shakespeare</button>
                <button class="preset-btn" onclick="setPreset('teacher')">📖 Teacher</button>
            </div>
            <button onclick="savePersonality()">Save Personality ✅</button>
        </div>
    </div>

    <!-- AI Floating Window -->
    <div class="ai-window" id="aiWindow">
        <div class="ai-header">
            🤖 AI Assistant
            <div class="ai-header-right">
                <button class="ai-personality-btn" onclick="openPersonality()">🎭 Personality</button>
                <button class="ai-close" onclick="toggleAI()">✕</button>
            </div>
        </div>
        <div class="ai-messages" id="aiMessages">
            <div class="ai-msg assistant">Hey! I'm your private AI assistant. Ask me anything! 👋</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="aiInput" placeholder="Ask me anything..." />
            <button onclick="sendAI()">➤</button>
        </div>
    </div>

    <!-- AI Toggle Button -->
    <button class="ai-toggle" id="aiToggle" onclick="toggleAI()">🤖</button>

    <!-- Chat -->
    <div class="container">
        <div class="header">
            🌐 Worldwide <span>Across-the-world chatting</span>
            <div class="header-right">
                <button class="icon-btn" id="adminBtn" style="display:none" onclick="openAdmin()">🛡️</button>
                <button class="icon-btn" onclick="openSettings()">⚙️</button>
                <img id="headerAvatar" class="header-avatar" src="" onclick="openSettings()" />
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Message #general" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let profile = {};
        let selectedStatus = "online";
        let selectedSettingsStatus = "online";
        let avatarData = "";
        let settingsAvatarData = "";
        let aiHistory = [];
        let aiPersonality = "You are a helpful, friendly AI assistant.";

        const statusColors = { online: "#43b581", busy: "#f04747", away: "#faa61a" };
        const statusLabels = { online: "🟢 Online", busy: "🔴 Busy", away: "🟡 Away" };

        const presets = {
            default: "You are a helpful, friendly AI assistant.",
            pirate: "You are a pirate. You speak entirely in pirate slang and always reference the sea, treasure, and sailing. Yarr!",
            roast: "You are a roast bot. You gently roast everything the user says in a funny, lighthearted way. Never be mean, just playfully sarcastic.",
            shakespeare: "You are Shakespeare. You respond entirely in Early Modern English, using thee, thou, dost, and other Shakespearean language.",
            teacher: "You are a knowledgeable teacher, who is very learned. You can explain things in great detail, and always ready to help."
        };

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
            showError('');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        document.getElementById("avatarInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById("avatarPreview").src = ev.target.result;
                avatarData = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById("settingsAvatarInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById("settingsAvatarPreview").src = ev.target.result;
                settingsAvatarData = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        function selectStatus(el, context) {
            const parent = el.closest('.status-options');
            parent.querySelectorAll('.status-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            if (context === 'signup') selectedStatus = el.dataset.status;
            if (context === 'settings') selectedSettingsStatus = el.dataset.status;
        }

        function openSettings() {
            document.getElementById('settingsBio').value = profile.bio || '';
            document.getElementById('settingsAvatarPreview').src = profile.avatar;
            settingsAvatarData = '';
            selectedSettingsStatus = profile.status || 'online';
            document.querySelectorAll('#settingsOverlay .status-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.status === selectedSettingsStatus);
            });
            document.getElementById('settingsOverlay').classList.add('open');
        }

        function closeSettings(e) {
            if (e.target === document.getElementById('settingsOverlay'))
                document.getElementById('settingsOverlay').classList.remove('open');
        }

        async function saveSettings() {
            const bio = document.getElementById('settingsBio').value.trim();
            const avatar = settingsAvatarData || profile.avatar;
            profile.bio = bio;
            profile.status = selectedSettingsStatus;
            profile.avatar = avatar;
            await fetch('/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile)
            });
            document.getElementById('headerAvatar').src = avatar;
            document.getElementById('settingsOverlay').classList.remove('open');
        }

        async function showProfile(username) {
            const res = await fetch(`/profile/${username}`);
            const data = await res.json();
            if (!data) return;
            document.getElementById('popupAvatar').src = data.avatar;
            document.getElementById('popupUsername').textContent = data.username;
            document.getElementById('popupStatus').textContent = statusLabels[data.status] || '🟢 Online';
            document.getElementById('popupStatus').style.color = statusColors[data.status] || statusColors.online;
            document.getElementById('popupBio').textContent = data.bio || 'No bio yet.';
            document.getElementById('profileOverlay').classList.add('open');
        }

        function closeProfile(e) {
            if (e.target === document.getElementById('profileOverlay'))
                document.getElementById('profileOverlay').classList.remove('open');
        }

        function openAdmin() {
            const key = prompt('Enter admin key:');
            if (key) window.open(`/admin?key=${key}`, '_blank');
        }

        function toggleAI() {
            const win = document.getElementById('aiWindow');
            const btn = document.getElementById('aiToggle');
            const isOpen = win.classList.contains('open');
            win.classList.toggle('open', !isOpen);
            btn.style.display = isOpen ? 'flex' : 'none';
        }

        function openPersonality() {
            document.getElementById('personalityInput').value = aiPersonality === "You are a helpful, friendly AI assistant." ? '' : aiPersonality;
            document.getElementById('personalityOverlay').classList.add('open');
        }

        function closePersonality(e) {
            if (e.target === document.getElementById('personalityOverlay'))
                document.getElementById('personalityOverlay').classList.remove('open');
        }

        function setPreset(name) {
            document.getElementById('personalityInput').value = presets[name] === presets.default ? '' : presets[name];
        }

        function savePersonality() {
            const val = document.getElementById('personalityInput').value.trim();
            aiPersonality = val || presets.default;
            aiHistory = [];
            document.getElementById('aiMessages').innerHTML = '<div class="ai-msg assistant">Personality updated! Ask me anything 👋</div>';
            document.getElementById('personalityOverlay').classList.remove('open');
        }

        async function sendAI() {
            const input = document.getElementById('aiInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            appendAIMsg(text, 'user');
            aiHistory.push({ role: 'user', content: text });
            const typing = appendAIMsg('Thinking...', 'typing');
            const res = await fetch('/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: aiHistory, personality: aiPersonality })
            });
            const data = await res.json();
            typing.remove();
            appendAIMsg(data.reply, 'assistant');
            aiHistory.push({ role: 'assistant', content: data.reply });
        }

        function appendAIMsg(text, role) {
            const div = document.createElement('div');
            div.classList.add('ai-msg', role);
            div.textContent = text;
            const container = document.getElementById('aiMessages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        document.getElementById('aiInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendAI();
        });

        async function doLogin() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            if (!username || !password) return showError("Please fill in all fields");
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!data.success) return showError(data.error);
            enterChat(data.user);
        }

        async function doSignup() {
            const username = document.getElementById("signupUsername").value.trim();
            const password = document.getElementById("signupPassword").value.trim();
            const bio = document.getElementById("signupBio").value.trim();
            if (!username || !password) return showError("Username and password required");
            const avatar = avatarData || `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`;
            const res = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, bio, status: selectedStatus, avatar })
            });
            const data = await res.json();
            if (!data.success) return showError(data.error);
            enterChat({ username, bio, status: selectedStatus, avatar });
        }

        async function enterChat(user) {
            profile = user;
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("headerAvatar").src = user.avatar;
            document.getElementById("aiToggle").classList.add('visible');

            if (user.username === 'Indian_IV') {
                document.getElementById('adminBtn').style.display = 'flex';
            }

            const res = await fetch('/messages');
            const msgs = await res.json();
            msgs.forEach(m => {
                fetch(`/profile/${m.username}`)
                    .then(r => r.json())
                    .then(p => appendMessage({
                        username: m.username,
                        content: m.content,
                        system: false,
                        avatar: p ? p.avatar : `https://api.dicebear.com/7.x/bottts/svg?seed=${m.username}`,
                        status: p ? p.status : 'online',
                        bio: p ? p.bio : '',
                        id: m.id
                    }));
            });

            socket.emit("message", {
                username: "System",
                content: `${user.username} joined the chat! 👋`,
                system: true
            });
        }

        document.getElementById("loginPassword").addEventListener("keypress", e => {
            if (e.key === "Enter") doLogin();
        });

        document.getElementById("messageInput").addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content || !profile.username) return;
            socket.emit("message", {
                username: profile.username,
                bio: profile.bio,
                status: profile.status,
                avatar: profile.avatar,
                content,
                system: false
            });
            input.value = "";
        }

        // All socket listeners outside enterChat
        socket.on("message", function(data) { appendMessage(data); });

        socket.on('kicked', (data) => {
            if (data.username === profile.username) {
                alert('You have been kicked from the chat!');
                location.reload();
            }
        });

        socket.on('message_deleted', (data) => {
            const el = document.getElementById(`msg-${data.id}`);
            if (el) el.remove();
        });

        function appendMessage(data) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.classList.add("message");
            if (data.id) div.id = `msg-${data.id}`;
            if (data.system) {
                div.innerHTML = `<span class="system">${data.content}</span>`;
            } else {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const statusColor = statusColors[data.status] || statusColors.online;
                div.innerHTML = `
                    <div class="avatar-wrapper">
                        <img class="avatar" src="${data.avatar}"
                            onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${data.username}'"
                            onclick="showProfile('${data.username}')" />
                        <div class="status-dot" style="background:${statusColor}"></div>
                    </div>
                    <div class="message-body">
                        <div class="message-header">
                            <span class="username" onclick="showProfile('${data.username}')">${data.username}</span>
                            <span class="timestamp">${time}</span>
                        </div>
                        ${data.bio ? `<span class="bio-tag">${data.bio}</span>` : ''}
                        <span class="content">${data.content}</span>
                    </div>
                `;
            }
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
