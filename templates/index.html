<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\\BEST CHAT//</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 500px;
            height: 650px;
            background: #2f3136;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header {
            background: #202225;
            padding: 16px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header span { color: #72767d; font-size: 14px; font-weight: normal; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid #2f3136;
        }
        .message-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .username {
            font-size: 14px;
            font-weight: bold;
            color: #7289da;
        }
        .timestamp {
            font-size: 11px;
            color: #72767d;
        }
        .content {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.5;
        }
        .bio-tag {
            font-size: 11px;
            color: #72767d;
            font-style: italic;
        }
        .system {
            color: #72767d;
            font-size: 13px;
            font-style: italic;
            text-align: center;
            width: 100%;
        }
        .input-area {
            padding: 16px;
            background: #2f3136;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]::placeholder { color: #72767d; }
        button {
            background: #7289da;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        button:hover { background: #5b6eae; }
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #36393f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .profile-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .profile-box h2 { color: white; text-align: center; font-size: 22px; }
        .profile-box p { color: #72767d; text-align: center; font-size: 13px; }
        .profile-box input[type="text"],
        .profile-box textarea {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #40444b;
            color: white;
            font-size: 14px;
            outline: none;
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
        }
        .profile-box textarea {
            resize: none;
            height: 80px;
        }
        .profile-box label {
            color: #72767d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .profile-box button { width: 100%; padding: 14px; }
        .avatar-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #7289da;
            background: #40444b;
        }
        .upload-btn {
            background: #40444b;
            color: #dcddde;
            font-size: 13px;
            padding: 8px 16px;
            width: auto !important;
        }
        .status-options { display: flex; gap: 10px; }
        .status-option {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: #40444b;
            color: #dcddde;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .status-option.selected {
            border-color: #7289da;
            background: #3d4a6b;
        }
    </style>
</head>
<body>

    <div class="screen" id="profileScreen">
        <div class="profile-box">
            <h2>✨ Create Your Profile</h2>
            <p>Set up your profile before joining</p>
            <div class="avatar-upload">
                <img id="avatarPreview" class="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" />
                <input type="file" id="avatarInput" accept="image/*" style="display:none" />
                <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">📷 Upload Photo</button>
            </div>
            <div>
                <label>Username</label>
                <input type="text" id="usernameInput" placeholder="Your username..." />
            </div>
            <div>
                <label>Bio</label>
                <textarea id="bioInput" placeholder="Tell us about yourself..."></textarea>
            </div>
            <div>
                <label>Status</label>
                <div class="status-options">
                    <div class="status-option selected" data-status="online" onclick="selectStatus(this)">🟢 Online</div>
                    <div class="status-option" data-status="busy" onclick="selectStatus(this)">🔴 Busy</div>
                    <div class="status-option" data-status="away" onclick="selectStatus(this)">🟡 Away</div>
                </div>
            </div>
            <button onclick="joinChat()">Join Chat 🚀</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            💬 General <span>Real time chat room</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Message #general" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let profile = { username: "", bio: "", status: "online", avatar: "" };
        let selectedStatus = "online";

        const statusColors = {
            online: "#43b581",
            busy: "#f04747",
            away: "#faa61a"
        };

        // Auto load profile on page open
        window.addEventListener('load', async () => {
            const saved = localStorage.getItem('chatUsername');
            if (saved) {
                const res = await fetch(`/profile/${saved}`);
                const data = await res.json();
                if (data) {
                    profile = data;
                    document.getElementById("usernameInput").value = data.username;
                    document.getElementById("bioInput").value = data.bio || '';
                    document.getElementById("avatarPreview").src = data.avatar;
                    const statusEl = document.querySelector(`[data-status="${data.status}"]`);
                    if (statusEl) selectStatus(statusEl);
                }
            }
        });

        document.getElementById("avatarInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById("avatarPreview").src = ev.target.result;
                profile.avatar = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        function selectStatus(el) {
            document.querySelectorAll(".status-option").forEach(o => o.classList.remove("selected"));
            el.classList.add("selected");
            selectedStatus = el.dataset.status;
        }

        async function joinChat() {
            const username = document.getElementById("usernameInput").value.trim();
            const bio = document.getElementById("bioInput").value.trim();
            if (!username) return;

            profile.username = username;
            profile.bio = bio;
            profile.status = selectedStatus;
            if (!profile.avatar) {
                profile.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`;
            }

            localStorage.setItem('chatUsername', username);

            await fetch('/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile)
            });

            document.getElementById("profileScreen").style.display = "none";

            const res = await fetch('/messages');
            const msgs = await res.json();
            msgs.forEach(m => appendMessage({
                username: m.username,
                content: m.content,
                system: false,
                avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${m.username}`,
                status: 'online'
            }));

            socket.emit("message", {
                username: "System",
                content: `${username} joined the chat! 👋`,
                system: true
            });
        }

        document.getElementById("usernameInput").addEventListener("keypress", e => {
            if (e.key === "Enter") joinChat();
        });

        document.getElementById("messageInput").addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content || !profile.username) return;
            socket.emit("message", {
                username: profile.username,
                bio: profile.bio,
                status: profile.status,
                avatar: profile.avatar,
                content,
                system: false
            });
            input.value = "";
        }

        socket.on("message", function(data) {
            appendMessage(data);
        });

        function appendMessage(data) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.classList.add("message");

            if (data.system) {
                div.innerHTML = `<span class="system">${data.content}</span>`;
            } else {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const statusColor = statusColors[data.status] || statusColors.online;
                div.innerHTML = `
                    <div class="avatar-wrapper">
                        <img class="avatar" src="${data.avatar}" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${data.username}'" />
                        <div class="status-dot" style="background:${statusColor}"></div>
                    </div>
                    <div class="message-body">
                        <div class="message-header">
                            <span class="username">${data.username}</span>
                            <span class="timestamp">${time}</span>
                        </div>
                        ${data.bio ? `<span class="bio-tag">${data.bio}</span>` : ''}
                        <span class="content">${data.content}</span>
                    </div>
                `;
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
